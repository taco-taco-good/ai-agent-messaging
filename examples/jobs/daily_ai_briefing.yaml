id: daily_ai_briefing
description: Daily AI, homelab, automation briefing draft for Taco
agent: codex
enabled: false
skill: daily_ai_briefing

schedule:
  kind: cron
  expr: "0 7 * * *"
  timezone: "Asia/Seoul"

allowed_tools:
  - job.sqlite_query
  - job.render_template
  - job.run_agent_prompt
  - job.persist_text
  - job.persist_memory

output:
  artifact_path: briefings/daily-ai-briefing.md

steps:
  - id: load_items
    type: load
    tool: job.sqlite_query
    with:
      database_path: /Users/taco/projects/ai-agent-messaging/runtime/briefing-collector.sqlite
      sql: |
        SELECT source, category, title, summary, url, published_at
        FROM collected_items
        ORDER BY published_at DESC
        LIMIT 20

  - id: compose_context
    type: generate
    tool: job.render_template
    with:
      template: |
        수집 데이터:
        {{ steps.load_items.rows }}

  - id: generate_briefing
    type: generate
    tool: job.run_agent_prompt
    with:
      prompt: "{{ steps.compose_context.content }}"

  - id: persist_briefing
    type: persist
    tool: job.persist_text
    with:
      content: "{{ steps.generate_briefing.response }}"

  - id: persist_memory
    type: persist
    tool: job.persist_memory
    with:
      content: "{{ steps.generate_briefing.response }}"
      topic: "daily ai briefing"
      summary: "Daily AI, homelab, and automation briefing generated by job runtime."
      tags:
        - job
        - briefing
        - ai
